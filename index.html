<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <link rel="stylesheet" href="css/styles.css">
  <title>FORMULARIO</title>
</head>
<body>
  <section class="form-register">
  <link rel="stylesheet" href="css/styles.css">
  <div class="container">
    <header class="header">
    <h4 id="title" class="text-center">ACTIVIDAD 1</h4>
    <br>
    <h1 id="title" class="text-center">CONTACTO ✆</h1>
    
    </header>
    <form id="registrationForm">
    <body>
    <form id="registrationForm">
    <br>
    <div class="caja">
      <label for="fullName">Nombre:</label>
        <input type="text" id="Nombre" name="Nombre" oninput="validateFullName(this)" required title="Ingresa tu nombre">
     </div>

      <div class="form-group">
        <label for="fullName">Apellidos:</label>
        <input type="text" id="Apellido1" name="Apellido1" oninput="validateFullName(this)" required title="Ingresa tu primer apellido">
     </div>
    <br>
     <div class="form-group">
        <label for="group">Telefono:</label>
        <input type="text" id="Telefono" name="Telefono" maxlength="10" oninput="validateControlNumber(this)" required title="Debe tener 10 dígitos y solo números">
     </div>
  
    <br>
    <button type="submit">Enviar</button>
    </form>
    <br>
      <h4 id="title" class="text-center">ACTIVIDAD 2 </h4>
       <div class="row"><span> <button onclick="window.open('https://nataly4321bu-bit.github.io/SUBSCRIPCION/')">SUBSCRIPCIÓN</button></span></div>
      

<script>
   function validateControlNumber(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
       }

          function validateFullName(input) {
        input.value = input.value.replace(/[^A-Za-záéíóúÁÉÍÓÚñÑ\s]/g, '');
        input.value = input.value.toUpperCase();
     }


    document.getElementById('registrationForm').onsubmit = function(event) {
        event.preventDefault(); 
        alert('Formulario enviado con éxito.');
    };
</script>
</body>
</body>
</html>
